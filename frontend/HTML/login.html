<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Quantity Measurement App</title>
  <link rel="stylesheet" href="../CSS/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <div id="auth-page" class="page">
    <div class="auth-scene">

      <div class="auth-deco-card">
        <div class="deco-circle">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="90" fill="#d6e6ff" opacity="0.6"/>
            <circle cx="100" cy="100" r="70" fill="#a8c8ff" opacity="0.7"/>
            <rect x="55" y="95" width="82" height="48" rx="6" fill="#5b8cff"/>
            <rect x="55" y="95" width="82" height="48" rx="6" fill="none" stroke="#2a4fd4" stroke-width="2"/>
            <line x1="76" y1="95" x2="76" y2="143" stroke="#2a4fd4" stroke-width="1.2" opacity="0.5"/>
            <line x1="97" y1="95" x2="97" y2="143" stroke="#2a4fd4" stroke-width="1.2" opacity="0.5"/>
            <line x1="118" y1="95" x2="118" y2="143" stroke="#2a4fd4" stroke-width="1.2" opacity="0.5"/>
            <line x1="55" y1="114" x2="137" y2="114" stroke="#2a4fd4" stroke-width="1.2" opacity="0.5"/>
            <line x1="45" y1="80" x2="55" y2="95" stroke="#2a4fd4" stroke-width="4" stroke-linecap="round"/>
            <line x1="33" y1="66" x2="46" y2="81" stroke="#2a4fd4" stroke-width="4" stroke-linecap="round"/>
            <circle cx="72" cy="151" r="7" fill="#2a4fd4"/>
            <circle cx="120" cy="151" r="7" fill="#2a4fd4"/>
            <circle cx="108" cy="68" r="14" fill="#ffb347"/>
            <path d="M94 82 Q108 76 122 82 L126 102 L90 102 Z" fill="white" opacity="0.9"/>
            <path d="M90 102 Q82 118 70 123" stroke="#b97eff" stroke-width="5" stroke-linecap="round" fill="none"/>
            <path d="M126 102 Q134 112 143 110" stroke="#b97eff" stroke-width="5" stroke-linecap="round" fill="none"/>
            <rect x="133" y="96" width="14" height="20" rx="2" fill="#444"/>
            <rect x="135" y="98" width="10" height="14" rx="1" fill="#7ecfff"/>
            <path d="M96 62 Q100 54 108 54 Q118 54 120 62" fill="#333" stroke="none"/>
          </svg>
        </div>
        <p class="deco-label">QUANTITY MEASUREMENT APP</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
          <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">SIGNUP</button>
        </div>

        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="field-group">
            <label>Email Id</label>
            <input type="text" id="login-username" placeholder="Enter username" autocomplete="username">
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
              <button type="button" class="pw-toggle" onclick="togglePw('login-password', this)">
                <span class="material-icons-round">visibility_off</span>
              </button>
            </div>
          </div>
          <p class="form-error" id="login-error"></p>
          <button type="submit" class="btn-primary-red">Login</button>
          <div class="or-divider">
            <span class="dash-line">──────────</span>OR<span class="dash-line">──────────</span>
          </div>
          <div class="social-row">
            <button type="button" class="btn-google" id="google-login-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" style="margin-right:6px">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Sign in with Google
            </button>
          </div>
        </form>

        <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
          <div class="field-group">
            <label>Username</label>
            <input type="text" id="signup-username" placeholder="Choose a username">
          </div>
          <div class="field-group">
            <label>Password <span class="hint">(3–10 chars · uppercase · special char)</span></label>
            <div class="pw-wrap">
              <input type="password" id="signup-password" placeholder="e.g. Alice@1">
              <button type="button" class="pw-toggle" onclick="togglePw('signup-password', this)">
                <span class="material-icons-round">visibility_off</span>
              </button>
            </div>
          </div>
          <p class="form-error" id="signup-error"></p>
          <button type="submit" class="btn-primary-red">Create Account</button>
        </form>
      </div>

    </div>
  </div>

  <script src="../JS/api.js"></script>
  <script src="../JS/auth.js"></script>
</body>
</html>
